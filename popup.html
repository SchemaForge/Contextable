// ===== popup.html =====
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 350px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    .header {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .header p {
      margin: 4px 0 0 0;
      opacity: 0.9;
      font-size: 12px;
    }
    .content {
      padding: 20px;
    }
    .schema-section {
      margin-bottom: 20px;
    }
    .schema-section label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #374151;
    }
    .schema-select {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      background: white;
      font-size: 14px;
    }
    .schema-preview {
      background: #f9fafb;
      padding: 12px;
      border-radius: 6px;
      margin-top: 12px;
      font-size: 12px;
    }
    .schema-preview h4 {
      margin: 0 0 8px 0;
      color: #1f2937;
    }
    .schema-preview .detail {
      color: #6b7280;
      margin-bottom: 4px;
    }
    .toggle-section {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: #f9fafb;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .toggle-button {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }
    .toggle-button.active {
      background: #10b981;
    }
    .toggle-button.inactive {
      background: #6b7280;
    }
    .status {
      font-size: 12px;
      color: #6b7280;
      text-align: center;
      padding: 10px;
      border-top: 1px solid #e5e7eb;
    }
    .status.active {
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ContextOS</h1>
    <p>AI Context Enhancement</p>
  </div>
  
  <div class="content">
    <div class="toggle-section">
      <span>Schema Enhancement</span>
      <button id="toggle-btn" class="toggle-button inactive">OFF</button>
    </div>
    
    <div class="schema-section">
      <label for="schema-select">Select Schema:</label>
      <select id="schema-select" class="schema-select">
        <option value="">Loading schemas...</option>
      </select>
      
      <div id="schema-preview" class="schema-preview" style="display: none;">
        <!-- Schema details will be inserted here -->
      </div>
    </div>
  </div>
  
  <div style="margin: 12px 20px; padding: 8px; background: #f5f5f5; border-radius: 4px;">
    <div style="font-size: 11px; font-weight: 500; margin-bottom: 4px; color: #374151;">API Key:</div>
    <div style="font-size: 10px; font-family: monospace; word-break: break-all; color: #6b7280;">ctx_0f898399ac7705277c61cbc7ea04a1381df2a26248da9313c6ed5cb19b01f939</div>
  </div>

  <div id="status" class="status">
    Ready to enhance your ChatGPT prompts
  </div>

  <script src="popup.js"></script>
</body>
</html>
